name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for the release (e.g. v0.1.0)'
        required: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            archive_ext: tar.gz
            bin: btuber
          - os: macos-latest
            name: macos-aarch64
            archive_ext: tar.gz
            bin: btuber
          - os: windows-latest
            name: windows-x86_64
            archive_ext: zip
            bin: btuber.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libxi-dev libxcursor-dev libxrandr-dev \
            libxinerama-dev libwayland-dev libxkbcommon-dev \
            libasound2-dev

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        shell: bash
        run: zig build -Doptimize=ReleaseFast "-Dversion=${{ steps.version.outputs.tag }}"

      - name: Stage release files
        shell: bash
        run: |
          mkdir -p dist/btuber-${{ steps.version.outputs.tag }}-${{ matrix.name }}
          cp zig-out/bin/${{ matrix.bin }} dist/btuber-${{ steps.version.outputs.tag }}-${{ matrix.name }}/
          cp btuber.ini dist/btuber-${{ steps.version.outputs.tag }}-${{ matrix.name }}/ || true
          cp p2mgWanda.png p2mgWandaOpen.png dist/btuber-${{ steps.version.outputs.tag }}-${{ matrix.name }}/ || true

      - name: Archive (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          cd dist
          tar -czvf btuber-${{ steps.version.outputs.tag }}-${{ matrix.name }}.tar.gz btuber-${{ steps.version.outputs.tag }}-${{ matrix.name }}

      - name: Archive (zip)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path "btuber-${{ steps.version.outputs.tag }}-${{ matrix.name }}" -DestinationPath "btuber-${{ steps.version.outputs.tag }}-${{ matrix.name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: btuber-${{ matrix.name }}
          path: dist/btuber-${{ steps.version.outputs.tag }}-${{ matrix.name }}.${{ matrix.archive_ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: btuber ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: artifacts/**/*
